events {}
http {
  server {
    listen 80;
    server_name _;
    client_max_body_size 2m;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy same-origin always;
    location /api/ { proxy_pass http://api:3000; proxy_set_header Host $host; proxy_set_header X-Request-Id $request_id; proxy_set_header X-Forwarded-Proto $scheme; }
    location / { root /usr/share/nginx/html; try_files $uri $uri/ /index.html; }
  }
}
