name: scheduling-new

services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-scheduling}
      MYSQL_USER: ${MYSQL_USER:-scheduling_app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD in .env}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in .env}
      TZ: UTC
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    command:
      - --default-time-zone=+00:00
      - --sql-mode=STRICT_TRANS_TABLES,ERROR_FOR_DIVISION_BY_ZERO,NO_ENGINE_SUBSTITUTION
    volumes:
      - scheduling_mysql:/var/lib/mysql
      - ./infra/mysql/conf.d/charset.cnf:/etc/mysql/conf.d/charset.cnf:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 3s
      timeout: 5s
      retries: 30
      start_period: 15s
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    ports:
      - "${REDIS_PORT:-6380}:6379"
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "noeviction"]
    volumes:
      - scheduling_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?set MINIO_ACCESS_KEY in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?set MINIO_SECRET_KEY in .env}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - scheduling_minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  scheduler:
    build:
      context: ./services/scheduler
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-scheduling}
      MYSQL_USER: ${MYSQL_USER:-scheduling_app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD in .env}
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
    restart: unless-stopped

  notification-worker:
    build:
      context: ./services/notification-worker
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-scheduling}
      MYSQL_USER: ${MYSQL_USER:-scheduling_app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD in .env}
      WECHAT_MODE: ${WECHAT_MODE:-mock}
      WX_APPID: ${WX_APPID:-}
      WX_SECRET: ${WX_SECRET:-}
      WX_TEMPLATE_JOIN_SUCCESS_ID: ${WX_TEMPLATE_JOIN_SUCCESS_ID:-}
      WX_TEMPLATE_MISSING_AVAILABILITY_ID: ${WX_TEMPLATE_MISSING_AVAILABILITY_ID:-}
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  deadline-worker:
    build:
      context: ./services/deadline-worker
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-scheduling}
      MYSQL_USER: ${MYSQL_USER:-scheduling_app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD in .env}
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

volumes:
  scheduling_mysql:
  scheduling_redis:
  scheduling_minio:
