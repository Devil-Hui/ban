name: scheduling-production

services:
  nginx:
    image: nginx:1.27-alpine
    ports: ["80:80", "443:443"]
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./apps/admin-web/dist:/usr/share/nginx/html:ro
    depends_on: [api]
    restart: unless-stopped
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    env_file: .env.production
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped
  mysql:
    image: mysql:8.4
    env_file: .env.production
    command: ["--default-time-zone=+00:00", "--sql-mode=STRICT_TRANS_TABLES,ERROR_FOR_DIVISION_BY_ZERO,NO_ENGINE_SUBSTITUTION"]
    volumes: ["scheduling_mysql_prod:/var/lib/mysql"]
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 30
  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "noeviction"]
    volumes: ["scheduling_redis_prod:/data"]
    healthcheck: { test: ["CMD", "redis-cli", "ping"], interval: 5s, timeout: 3s, retries: 20 }
  scheduler:
    build: ./services/scheduler
    env_file: .env.production
    depends_on: [mysql, redis]
    restart: unless-stopped
  notification-worker:
    build: ./services/notification-worker
    env_file: .env.production
    depends_on: [mysql]
    restart: unless-stopped
  deadline-worker:
    build: ./services/deadline-worker
    env_file: .env.production
    depends_on: [mysql]
    restart: unless-stopped

volumes:
  scheduling_mysql_prod:
  scheduling_redis_prod:
